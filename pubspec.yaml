name: flutter_application_1
description: "Fraser Valley Sports"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.3
  google_maps_flutter: ^2.12.1
  firebase_analytics: ^12.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/icon/Fraser Valley Sports - Logo.png

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true

  image_path: "assets/icon/Fraser Valley Sports - Logo.png"